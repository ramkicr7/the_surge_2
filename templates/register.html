{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="height:80vh;">
    <div class="glass-card col-md-6">
        <h3 class="text-center mb-4">Create Account</h3>

        <form method="POST">
            <input name="full_name" class="form-control mb-2" placeholder="Full Name" required>
            <input name="email" class="form-control mb-2" placeholder="Email" required>
            <input name="phone" class="form-control mb-2" placeholder="Phone" required>
            <input name="aadhaar" class="form-control mb-2" placeholder="Aadhaar" required>
            <input type="password" name="password" class="form-control mb-2" placeholder="Password" required>

            <button class="btn btn-purple w-100 mt-3">Register</button>
        </form>
    </div>
</div>

{% endblock %}
