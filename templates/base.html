<!DOCTYPE html>
<html>
<head>
    <title>The Surge</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font (Professional Look) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-dark text-light">

<!-- 🔊 AUDIO -->
<audio id="tudumSound" src="{{ url_for('static', filename='audio/tudum.mp3') }}"></audio>

<nav class="navbar navbar-expand-lg navbar-dark px-4 shadow-sm">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard">
        <img src="{{ url_for('static', filename='images/logo.png') }}" width="40">
        <span class="fw-bold surge-title">THE SURGE</span>
    </a>
</nav>

<div class="container-fluid py-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<!-- 🎬 SURGE ANIMATION + AUDIO -->
<script>
    window.addEventListener("load", function () {

        const sound = document.getElementById("tudumSound");

        // Delay for cinematic sync
        setTimeout(function(){
            sound.play().catch(() => {});
        }, 800);

    });
</script>

</body>
</html>
